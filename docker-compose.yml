services:
  postgres:
    image: cgr.dev/chainguard/postgres:latest
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: docker/node-dev.Dockerfile
    image: porkpie-node-dev:24-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run migrate -w @porkpie/server && npm run dev -w @porkpie/server"
    environment:
      PORT: 4000
      DATABASE_URL: postgres://${POSTGRES_USER:?Set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env}
      CLIENT_ORIGIN: http://localhost:5173
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-5000}
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - server-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: docker/node-dev.Dockerfile
    image: porkpie-node-dev:24-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -w @porkpie/client"
    environment:
      VITE_DEV_PROXY_TARGET: http://server:4000
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - client-node-modules:/app/node_modules
    depends_on:
      - server

volumes:
  postgres-data:
  server-node-modules:
  client-node-modules:
